<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日信息聚合 · 归档</title>
<style>
:root {
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --text: #0f172a;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --hover: #f1f5f9;
    --max-width: 800px;
}
@media (prefers-color-scheme: dark) {
    :root {
        --bg: #0f172a;
        --card-bg: #1e293b;
        --text: #f1f5f9;
        --text-secondary: #94a3b8;
        --border: #334155;
        --hover: #1e293b;
    }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 0 16px;
}
.container { max-width: var(--max-width); margin: 0 auto; padding: 24px 0 80px; }

/* header */
header {
    text-align: center;
    padding: 40px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
}
header h1 { font-size: 1.5rem; font-weight: 700; }
header .subtitle {
    color: var(--text-secondary);
    font-size: 0.875rem;
    margin-top: 4px;
}

/* date nav */
.date-nav {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
}
.date-nav a {
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 0.875rem;
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    transition: all .15s;
}
.date-nav a:hover, .date-nav a.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
}

/* overview */
.overview {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 40px;
}
.stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
}
.stat-card .num {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.2;
}
.stat-card .label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 2px;
}

/* category section */
.category-section { margin-bottom: 40px; }
.category-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 16px;
}
.category-header h2 { font-size: 1.2rem; font-weight: 600; }
.category-header .count {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 400;
}

/* article card */
.article-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    transition: border-color .15s;
}
.article-card:hover { border-color: var(--text-secondary); }
.article-card .title {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.4;
}
.article-card .title a {
    color: var(--text);
    text-decoration: none;
}
.article-card .title a:hover { text-decoration: underline; }
.article-card .meta {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 6px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}
.article-card .source-badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    background: var(--hover);
    border: 1px solid var(--border);
}
.article-card .summary {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 8px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.article-card .hot {
    color: #f59e0b;
    letter-spacing: 1px;
}
.empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
    font-size: 0.9rem;
}

/* footer */
footer {
    text-align: center;
    padding: 24px 0;
    color: var(--text-secondary);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
    margin-top: 40px;
}

table { width:100%; border-collapse:collapse; margin-top:16px; }
th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--border); }
th { font-size:0.8rem; color:var(--text-secondary); font-weight:600; }
tr:hover td { background:var(--hover); }
a { color:var(--text); text-decoration:none; }
a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>📰 每日信息聚合</h1>
        <div class="subtitle">归档</div>
    </header>
    <table>
        <tr><th>日期</th><th>文章数</th><th>来源数</th></tr>
        <tr><td><a href="./2026-05-14.html">2026-05-14</a></td><td>181</td><td>7</td></tr>
    </table>
    <footer><a href="./">返回最新</a></footer>
</div>
</body>
</html>
