name: Daily Digest

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python -m daily_digest.main

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: digest-report
          path: output/*.md
          retention-days: 30

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: digest-database
          path: data/digest.db
          retention-days: 7
