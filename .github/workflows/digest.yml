# 每日信息聚合 —— GitHub Actions 自动调度
# 每天 UTC 0:00 和 10:00 (北京时间 08:00 / 18:00) 各跑一次

name: Daily Digest

on:
  schedule:
    - cron: "0 0 * * *"   # 北京时间 08:00
    - cron: "0 10 * * *"  # 北京时间 18:00
  workflow_dispatch:       # 支持手动触发

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行聚合
        run: python -m daily_digest.main

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: digest-report
          path: output/*.md
          retention-days: 30

      - name: 上传数据库
        uses: actions/upload-artifact@v4
        with:
          name: digest-database
          path: data/digest.db
          retention-days: 7
