name: Daily Digest

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python -m daily_digest.main

      - name: Generate site
        run: python -c "from daily_digest.web_gen import generate_site; generate_site()"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: digest-report
          path: output/*.md
          retention-days: 30

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: digest-database
          path: data/digest.db
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: digest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
